AWSTemplateFormatVersion: '2010-09-09'
Description: Fitbit Health Data DynamoDB Table - Single Table Design

Resources:
  FitbitHealthDataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: FitbitHealthData
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false
      Tags:
        - Key: Project
          Value: fitbit-health-bi
        - Key: Phase
          Value: "1"

Outputs:
  TableName:
    Description: DynamoDB Table Name
    Value: !Ref FitbitHealthDataTable
  TableArn:
    Description: DynamoDB Table ARN
    Value: !GetAtt FitbitHealthDataTable.Arn
  GSI1Name:
    Description: GSI1 Index Name
    Value: GSI1
